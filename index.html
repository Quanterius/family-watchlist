<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 Family Watchlist</title>
  <style>
    /* ── Reset & tokens ─────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f13;
      --surface:   #1a1a22;
      --surface2:  #22222e;
      --border:    rgba(255,255,255,0.08);
      --border2:   rgba(255,255,255,0.15);
      --text:      #e8e8f0;
      --muted:     #888899;
      --accent:    #7c6fcd;
      --accent2:   #a594f9;
      --gold:      #f5c542;
      --green:     #4caf82;
      --red:       #e05c5c;
      --radius:    12px;
      --radius-sm: 8px;
      --shadow:    0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #1a1a28 0%, #12121e 100%);
      border-bottom: 1px solid var(--border);
      padding: 18px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .header-title span { color: var(--accent2); }

    /* ── Filter bars ─────────────────────────────── */
    .filter-bar {
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-bar-2 {
      padding: 8px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .filter-bar-2::-webkit-scrollbar { display: none; }

    .filter-bar-2-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
      padding-right: 4px;
    }

    .filter-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-chip.active, .filter-chip:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .filter-chip.mood-chip-filter.active {
      background: rgba(124,111,205,0.35);
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .filter-chip.who-chip-filter.active {
      background: rgba(76,175,130,0.25);
      border-color: var(--green);
      color: var(--green);
    }

    .filter-chip.exclude-chip.active {
      background: rgba(224,92,92,0.2);
      border-color: var(--red);
      color: var(--red);
    }

    .filter-chip.short-chip.active {
      background: rgba(245,197,66,0.2);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ── Section labels ──────────────────────────── */
    .section-label {
      padding: 20px 16px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Currently Watching strip ────────────────── */
    #currently-watching-section {
      padding: 0 16px 16px;
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    #currently-watching-section::-webkit-scrollbar { display: none; }

    /* ── Card grid ───────────────────────────────── */
    #watchlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      padding: 0 16px;
    }

    @media (max-width: 480px) {
      #watchlist-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 8px;
        padding: 0 10px;
      }
      .card-body { padding: 7px 7px 6px; }
      .card-title { font-size: 11px; }
      .card-actions { gap: 4px; }
      .btn-vote, .btn-icon { font-size: 11px; padding: 4px 6px; }
    }

    /* ── Movie card ──────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: default;
    }

    .card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

    .card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }

    .card-poster-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: var(--muted);
    }

    .card-body { padding: 10px 10px 8px; }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }

    .badge {
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .badge-type     { background: rgba(124,111,205,0.25); color: var(--accent2); }
    .badge-stream   { background: rgba(76,175,130,0.2);   color: var(--green); }
    .badge-rating   { background: rgba(245,197,66,0.2);   color: var(--gold); }
    .badge-watching { background: rgba(229,92,92,0.2);    color: var(--red); }

    .card-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .btn-vote {
      flex: 1;
      padding: 5px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-vote:hover { background: var(--surface2); color: var(--text); }

    .btn-icon {
      padding: 5px 7px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-icon:hover { background: var(--surface2); color: var(--red); }

    /* Start watching button */
    .btn-start-watching {
      width: 100%;
      margin-top: 6px;
      padding: 5px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(76,175,130,0.4);
      background: rgba(76,175,130,0.1);
      color: var(--green);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .btn-start-watching:hover { background: rgba(76,175,130,0.2); }

    /* Currently watching card */
    .card-watching {
      flex-shrink: 0;
      width: 140px;
      background: var(--surface);
      border: 1px solid rgba(229,92,92,0.3);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-watching img, .card-watching .card-poster-placeholder {
      height: 90px;
      width: 100%;
      aspect-ratio: unset;
      object-fit: cover;
    }

    .card-watching .card-body { padding: 8px; }
    .card-watching .card-title { font-size: 12px; -webkit-line-clamp: 1; }

    .watching-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }

    .btn-done {
      flex: 1;
      padding: 4px 6px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(76,175,130,0.4);
      background: rgba(76,175,130,0.1);
      color: var(--green);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .btn-done:hover { background: rgba(76,175,130,0.25); }

    .btn-move-back {
      padding: 4px 6px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-move-back:hover { background: var(--surface2); color: var(--text); }

    /* ── FAB ─────────────────────────────────────── */
    #fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 26px;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124,111,205,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: transform 0.15s;
    }

    #fab:hover { transform: scale(1.08); }
    #fab:active { transform: scale(0.95); }

    /* ── Modal overlay ───────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid var(--border2);
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 20px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-title { font-size: 16px; font-weight: 700; }

    .btn-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── TMDB search ─────────────────────────────── */
    .search-wrap { position: relative; margin-bottom: 16px; }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
    }

    .search-results {
      border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
      background: var(--surface2);
      overflow: hidden;
      margin-bottom: 16px;
      display: none;
    }

    .search-result-item {
      display: flex;
      gap: 12px;
      padding: 10px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: rgba(124,111,205,0.12); }

    .result-thumb {
      width: 36px; height: 54px;
      border-radius: 4px; object-fit: cover;
      flex-shrink: 0; background: var(--surface);
    }

    .result-thumb-placeholder {
      width: 36px; height: 54px;
      border-radius: 4px; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .result-info { flex: 1; min-width: 0; }
    .result-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .result-year  { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .result-desc  {
      font-size: 11px; color: var(--muted); line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .autofill-preview {
      background: var(--surface2);
      border: 1px solid rgba(124,111,205,0.3);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 16px;
      display: none;
      gap: 12px;
    }

    .autofill-preview.visible { display: flex; }

    .preview-poster {
      width: 56px; height: 84px;
      border-radius: 6px; object-fit: cover; flex-shrink: 0;
    }

    .preview-poster-placeholder {
      width: 56px; height: 84px;
      border-radius: 6px; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }

    .preview-info { flex: 1; }
    .preview-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .preview-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
    .preview-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }

    .clear-selection {
      background: none; border: none; color: var(--muted); font-size: 11px;
      cursor: pointer; text-decoration: underline; padding: 4px 0; display: block;
    }

    /* ── Form fields ─────────────────────────────── */
    .form-group { margin-bottom: 14px; }

    .form-label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-control:focus { border-color: var(--accent); }
    select.form-control option { background: #1a1a22; }

    .mood-chips { display: flex; flex-wrap: wrap; gap: 7px; }

    .mood-chip {
      padding: 5px 12px;
      border-radius: 14px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.12s;
    }

    .mood-chip.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

    .whom-chips { display: flex; flex-wrap: wrap; gap: 7px; }

    .whom-chip {
      padding: 5px 12px;
      border-radius: 14px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.12s;
    }

    .whom-chip.selected {
      background: rgba(76,175,130,0.25);
      border-color: var(--green);
      color: var(--green);
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 8px;
    }

    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Loading / empty ──────────────────────────── */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 40px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state-text { font-size: 14px; }

    .toast {
      position: fixed;
      bottom: 96px;
      left: 50%; transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 13px;
      z-index: 400;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; }

    @media (min-width: 600px) {
      #watchlist-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
      .modal { border-radius: var(--radius); margin: auto; max-height: 85vh; }
      .modal-overlay { align-items: center; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────── -->
<header>
  <div class="header-title">🎬 <span>Family</span> Watchlist</div>
</header>

<!-- ── Filter row 1: type / streaming ──────────────── -->
<div class="filter-bar">
  <button class="filter-chip active" onclick="setFilter(this,'all')">All</button>
  <button class="filter-chip"        onclick="setFilter(this,'watching')">👀 Watching</button>
  <button class="filter-chip"        onclick="setFilter(this,'movie')">🎬 Movies</button>
  <button class="filter-chip"        onclick="setFilter(this,'tv')">📺 TV</button>
  <span id="stream-filters"></span>
</div>

<!-- ── Filter row 2: mood / who / short ────────────── -->
<div class="filter-bar-2">
  <span class="filter-bar-2-label">Mood</span>
  <span id="mood-filters"></span>
  <span style="width:1px;background:var(--border2);flex-shrink:0;margin:0 2px;align-self:stretch;"></span>
  <span class="filter-bar-2-label">Who</span>
  <span id="who-filters"></span>
  <span style="width:1px;background:var(--border2);flex-shrink:0;margin:0 2px;align-self:stretch;"></span>
  <button class="filter-chip short-chip" id="short-chip" onclick="toggleShort(this)">⏱ Under 60 min</button>
</div>

<!-- ── Currently Watching ──────────────────────────── -->
<div id="currently-watching-wrap" style="display:none">
  <div class="section-label">👀 Currently Watching</div>
  <div id="currently-watching-section"></div>
</div>

<!-- ── Want to Watch ───────────────────────────────── -->
<div class="section-label">📋 Want to Watch</div>
<div id="watchlist-grid">
  <div class="spinner"></div>
</div>

<!-- ── FAB ─────────────────────────────────────────── -->
<button id="fab" onclick="openModal()" aria-label="Add item">+</button>

<!-- ── Add Modal ───────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title">Add to Watchlist</span>
      <button class="btn-close" onclick="closeModal()">×</button>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="tmdb-search" class="search-input" type="text"
             placeholder="Search movies & TV shows…"
             autocomplete="off"
             oninput="onSearchInput(this.value)" />
    </div>

    <div id="search-results" class="search-results"></div>

    <div id="autofill-preview" class="autofill-preview">
      <div id="preview-poster-wrap"></div>
      <div class="preview-info">
        <div class="preview-title" id="preview-title"></div>
        <div class="preview-badges" id="preview-badges"></div>
        <div class="preview-desc" id="preview-desc"></div>
        <button class="clear-selection" onclick="clearSelection()">✕ Clear selection</button>
      </div>
    </div>

    <div id="manual-title-wrap" class="form-group">
      <label class="form-label">Title *</label>
      <input id="manual-title" class="form-control" type="text" placeholder="Or type a title manually…" />
    </div>

    <div class="form-group">
      <label class="form-label">Status</label>
      <select id="field-status" class="form-control">
        <option value="Want to Watch">Want to Watch</option>
        <option value="Currently Watching">Currently Watching</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Mood</label>
      <div class="mood-chips" id="mood-chips"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Who it's for</label>
      <div class="whom-chips" id="whom-chips"></div>
    </div>

    <button class="btn-submit" id="btn-add" onclick="submitItem()">Add to Watchlist</button>
  </div>
</div>

<!-- ── Toast ───────────────────────────────────────── -->
<div id="toast" class="toast"></div>

<script>

// CONFIG
// ═══════════════════════════════════════════════════════

const MOOD_TAGS = ['Funny', 'Chill', 'Intense', 'Romantic', 'Scary',
                   'Inspiring', 'Feel-good', 'Action', 'Educational', 'Short'];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let allItems      = [];
let activeFilter  = 'all';   // row-1 filter
let activeMood    = null;    // row-2 mood filter
let activeWho     = null;    // row-2 who filter: name or 'exclude:Name'
let shortOnly     = false;   // row-2 under-60-min filter
let selectedMoods = [];      // modal form
let selectedWhom  = ['Whole Family'];
let tmdbSelected  = null;
let searchTimer   = null;

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  buildMoodChips();
  buildWhomChips();
  loadItems();
});

// ═══════════════════════════════════════════════════════
// TMDB HELPERS
// ═══════════════════════════════════════════════════════
const TMDB_BASE  = 'https://api.themoviedb.org/3';
const TMDB_IMG   = 'https://image.tmdb.org/t/p/';
const TMDB_HEADS = { Authorization: `Bearer ${TMDB_TOKEN}`, 'Content-Type': 'application/json' };

async function tmdbSearch(query) {
  if (!query.trim()) return [];
  const res = await fetch(`${TMDB_BASE}/search/multi?query=${encodeURIComponent(query)}&include_adult=false`, { headers: TMDB_HEADS });
  if (!res.ok) return [];
  const data = await res.json();
  return (data.results || []).filter(r => r.media_type === 'movie' || r.media_type === 'tv').slice(0, 6);
}

async function tmdbDetails(id, mediaType) {
  const [detRes, provRes] = await Promise.all([
    fetch(`${TMDB_BASE}/${mediaType}/${id}?language=en-US`, { headers: TMDB_HEADS }),
    fetch(`${TMDB_BASE}/${mediaType}/${id}/watch/providers`, { headers: TMDB_HEADS }),
  ]);
  const det  = detRes.ok  ? await detRes.json()  : {};
  const prov = provRes.ok ? await provRes.json() : {};

  const usProviders = prov.results?.US?.flatrate || [];
  const streaming   = usProviders.map(p => p.provider_name).slice(0, 3).join(', ');
  const genre       = (det.genres || []).map(g => g.name).slice(0, 2).join(', ');
  const rating      = det.vote_average ? det.vote_average.toFixed(1) : '';

  let runtime = '';
  if (mediaType === 'movie' && det.runtime) {
    runtime = `${det.runtime} min`;
  } else if (mediaType === 'tv') {
    const s = det.number_of_seasons;
    const e = det.number_of_episodes;
    runtime = s ? `${s} season${s > 1 ? 's' : ''}${e ? `, ${e} ep` : ''}` : '';
  }

  return { streaming, genre, rating, runtime, details: det };
}

// ═══════════════════════════════════════════════════════
// SEARCH UI
// ═══════════════════════════════════════════════════════
function onSearchInput(val) {
  clearTimeout(searchTimer);
  if (!val.trim()) { hideSearchResults(); return; }
  searchTimer = setTimeout(() => doSearch(val), 350);
}

async function doSearch(query) {
  const box = document.getElementById('search-results');
  box.innerHTML = '<div style="padding:12px;text-align:center;color:var(--muted);font-size:13px">Searching…</div>';
  box.style.display = 'block';
  const results = await tmdbSearch(query);
  if (!results.length) {
    box.innerHTML = '<div style="padding:12px;text-align:center;color:var(--muted);font-size:13px">No results — you can add it manually below</div>';
    return;
  }
  box.innerHTML = results.map(r => {
    const title = r.title || r.name || '';
    const year  = (r.release_date || r.first_air_date || '').slice(0, 4);
    const thumb = r.poster_path
      ? `<img class="result-thumb" src="${TMDB_IMG}w92${r.poster_path}" loading="lazy" />`
      : `<div class="result-thumb-placeholder">🎬</div>`;
    const desc = (r.overview || '').slice(0, 100);
    return `<div class="search-result-item" onclick="selectResult(${r.id}, '${r.media_type}')">
              ${thumb}
              <div class="result-info">
                <div class="result-title">${escHtml(title)}</div>
                <div class="result-year">${year} · ${r.media_type === 'movie' ? '🎬 Movie' : '📺 TV'}</div>
                <div class="result-desc">${escHtml(desc)}</div>
              </div>
            </div>`;
  }).join('');
}

async function selectResult(id, mediaType) {
  hideSearchResults();
  document.getElementById('tmdb-search').value = '';
  const preview    = document.getElementById('autofill-preview');
  const posterWrap = document.getElementById('preview-poster-wrap');
  posterWrap.innerHTML = `<div class="preview-poster-placeholder" style="font-size:14px;color:var(--muted)">…</div>`;
  document.getElementById('preview-title').textContent = 'Loading…';
  document.getElementById('preview-badges').innerHTML  = '';
  document.getElementById('preview-desc').textContent  = '';
  preview.classList.add('visible');
  document.getElementById('manual-title-wrap').style.display = 'none';

  const { streaming, genre, rating, runtime, details } = await tmdbDetails(id, mediaType);
  const title     = details.title || details.name || '';
  const posterUrl = details.poster_path ? `${TMDB_IMG}w342${details.poster_path}` : '';
  const desc      = (details.overview || '').slice(0, 150);

  tmdbSelected = { id, mediaType, title, posterUrl, streaming, genre, rating, runtime, desc };

  posterWrap.innerHTML = posterUrl
    ? `<img class="preview-poster" src="${posterUrl}" />`
    : `<div class="preview-poster-placeholder">🎬</div>`;
  document.getElementById('preview-title').textContent = title;

  const badges = [];
  badges.push(mediaType === 'movie'
    ? '<span class="badge badge-type">🎬 Movie</span>'
    : '<span class="badge badge-type">📺 TV</span>');
  if (rating)    badges.push(`<span class="badge badge-rating">⭐ ${rating}</span>`);
  if (runtime)   badges.push(`<span class="badge badge-stream">${runtime}</span>`);
  if (streaming) streaming.split(', ').forEach(s => badges.push(`<span class="badge badge-stream">${s}</span>`));
  if (genre)     badges.push(`<span class="badge" style="background:rgba(255,255,255,0.07);color:var(--muted)">${genre}</span>`);
  document.getElementById('preview-badges').innerHTML = badges.join('');
  document.getElementById('preview-desc').textContent = desc;
}

function clearSelection() {
  tmdbSelected = null;
  document.getElementById('autofill-preview').classList.remove('visible');
  document.getElementById('manual-title-wrap').style.display = 'block';
  document.getElementById('tmdb-search').value = '';
}

function hideSearchResults() {
  const box = document.getElementById('search-results');
  box.style.display = 'none';
  box.innerHTML = '';
}

// ═══════════════════════════════════════════════════════
// MOOD & WHOM CHIPS (modal form)
// ═══════════════════════════════════════════════════════
function buildMoodChips() {
  document.getElementById('mood-chips').innerHTML = MOOD_TAGS.map(m =>
    `<button class="mood-chip" onclick="toggleMood(this,'${m}')">${m}</button>`
  ).join('');
}

function buildWhomChips() {
  document.getElementById('whom-chips').innerHTML = FAMILY_MEMBERS.map(m =>
    `<button class="whom-chip${m === 'Whole Family' ? ' selected' : ''}" onclick="toggleWhom(this,'${m}')">${m}</button>`
  ).join('');
}

function toggleMood(el, mood) {
  el.classList.toggle('selected');
  selectedMoods = selectedMoods.includes(mood)
    ? selectedMoods.filter(m => m !== mood)
    : [...selectedMoods, mood];
}

function toggleWhom(el, name) {
  if (name === 'Whole Family') {
    selectedWhom = ['Whole Family'];
    document.querySelectorAll('.whom-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    return;
  }
  selectedWhom = selectedWhom.filter(w => w !== 'Whole Family');
  el.classList.toggle('selected');
  selectedWhom = selectedWhom.includes(name)
    ? selectedWhom.filter(w => w !== name)
    : [...selectedWhom, name];
  if (!selectedWhom.length) {
    selectedWhom = ['Whole Family'];
    document.querySelectorAll('.whom-chip').forEach(c => {
      c.classList.toggle('selected', c.textContent === 'Whole Family');
    });
  } else {
    document.querySelector('.whom-chip').classList.remove('selected');
  }
}

// ═══════════════════════════════════════════════════════
// PHASE 3 — FILTER ROW 2
// ═══════════════════════════════════════════════════════

// Only show mood tags that are actually used in the current data
function buildMoodFilterChips() {
  const used = new Set();
  allItems.forEach(item =>
    (item.MoodTags || '').split(',').forEach(t => { const v = t.trim(); if (v) used.add(v); })
  );
  document.getElementById('mood-filters').innerHTML = [...used].map(mood =>
    `<button class="filter-chip mood-chip-filter${activeMood === mood ? ' active' : ''}"
             onclick="toggleMoodFilter('${mood}')">${mood}</button>`
  ).join('');
}

function buildWhoFilterChips() {
  const names = FAMILY_MEMBERS.filter(m => m !== 'Whole Family');
  document.getElementById('who-filters').innerHTML = names.flatMap(name => [
    `<button class="filter-chip who-chip-filter${activeWho === name ? ' active' : ''}"
             onclick="toggleWhoFilter('${name}')">${name}</button>`,
    `<button class="filter-chip exclude-chip${activeWho === 'exclude:' + name ? ' active' : ''}"
             onclick="toggleWhoFilter('exclude:${name}')" title="Hide ${name}'s picks">Not ${name}</button>`,
  ]).join('');
}

function toggleMoodFilter(mood) {
  activeMood = activeMood === mood ? null : mood;
  buildMoodFilterChips();
  renderWatchlist();
}

function toggleWhoFilter(key) {
  activeWho = activeWho === key ? null : key;
  buildWhoFilterChips();
  renderWatchlist();
}

function toggleShort(el) {
  shortOnly = !shortOnly;
  el.classList.toggle('active', shortOnly);
  renderWatchlist();
}

// Parse "104 min" → 104; anything without "min" returns null (TV seasons etc.)
function runtimeMinutes(runtimeStr) {
  if (!runtimeStr) return null;
  const m = runtimeStr.match(/^(\d+)\s*min/i);
  return m ? parseInt(m[1], 10) : null;
}

// ═══════════════════════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════════════════════
async function submitItem() {
  const title = tmdbSelected
    ? tmdbSelected.title
    : document.getElementById('manual-title').value.trim();
  if (!title) { showToast('Please enter a title'); return; }

  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  btn.textContent = 'Adding…';

  const body = {
    action:           'addItem',
    Title:            title,
    Type:             tmdbSelected ? (tmdbSelected.mediaType === 'movie' ? 'Movie' : 'TV Show') : '',
    Status:           document.getElementById('field-status').value,
    ForWho:           selectedWhom.join(', '),
    MoodTags:         selectedMoods.join(', '),
    Poster:           tmdbSelected?.posterUrl    || '',
    StreamingService: tmdbSelected?.streaming    || '',
    Runtime:          tmdbSelected?.runtime      || '',
    Genre:            tmdbSelected?.genre        || '',
    Rating:           tmdbSelected?.rating       || '',
  };

  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(body), redirect: 'follow' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showToast('✅ Added!');
    closeModal();
    loadItems();
  } catch (err) {
    showToast('❌ Error: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Add to Watchlist';
  }
}

// ═══════════════════════════════════════════════════════
// LOAD & RENDER
// ═══════════════════════════════════════════════════════
async function loadItems() {
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getItems`);
    const data = await res.json();
    allItems = data.items || [];
    renderAll();
    buildStreamFilters();
    buildMoodFilterChips();
    buildWhoFilterChips();
  } catch (e) {
    document.getElementById('watchlist-grid').innerHTML =
      `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">Couldn't load the list</div></div>`;
  }
}

function renderAll() {
  renderCurrentlyWatching();
  renderWatchlist();
}

function renderCurrentlyWatching() {
  const items = allItems.filter(i => i.Status === 'Currently Watching');
  const wrap  = document.getElementById('currently-watching-wrap');
  const sec   = document.getElementById('currently-watching-section');
  if (!items.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';

  sec.innerHTML = items.map(item => {
    const poster = item.Poster
      ? `<img src="${item.Poster}" alt="${escHtml(item.Title)}" loading="lazy" style="width:100%;height:90px;object-fit:cover;">`
      : `<div class="card-poster-placeholder" style="height:90px;aspect-ratio:unset">🎬</div>`;
    return `<div class="card-watching">
              ${poster}
              <div class="card-body">
                <div class="card-title">${escHtml(item.Title)}</div>
                <button class="btn-vote" onclick="vote('${item.ID}',this)">👍 ${item.Votes || 0}</button>
                <div class="watching-actions">
                  <button class="btn-done"      onclick="markDone('${item.ID}')">✅ Done</button>
                  <button class="btn-move-back" onclick="moveToWantToWatch('${item.ID}')" title="Move back to list">↩ Back</button>
                </div>
              </div>
            </div>`;
  }).join('');
}

function renderWatchlist() {
  const grid = document.getElementById('watchlist-grid');
  let items  = allItems.filter(i => i.Status === 'Want to Watch');

  // Row 1: type / streaming
  if (activeFilter === 'movie')    items = items.filter(i => i.Type === 'Movie');
  if (activeFilter === 'tv')       items = items.filter(i => i.Type === 'TV Show');
  if (activeFilter === 'watching') items = allItems.filter(i => i.Status === 'Currently Watching');
  if (!['all','movie','tv','watching'].includes(activeFilter)) {
    items = items.filter(i => (i.StreamingService || '').toLowerCase().includes(activeFilter.toLowerCase()));
  }

  // Row 2: mood
  if (activeMood) {
    items = items.filter(i =>
      (i.MoodTags || '').split(',').map(t => t.trim()).includes(activeMood)
    );
  }

  // Row 2: who
  if (activeWho) {
    if (activeWho.startsWith('exclude:')) {
      const excludeName = activeWho.replace('exclude:', '');
      items = items.filter(i => {
        const forWho = (i.ForWho || '').split(',').map(w => w.trim());
        return !forWho.includes(excludeName);
      });
    } else {
      items = items.filter(i => {
        const forWho = (i.ForWho || '').split(',').map(w => w.trim());
        return forWho.includes(activeWho) || forWho.includes('Whole Family');
      });
    }
  }

  // Row 2: under 60 min
  if (shortOnly) {
    items = items.filter(i => {
      const mins = runtimeMinutes(i.Runtime);
      return mins !== null && mins < 60;
    });
  }

  if (!items.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">🍿</div><div class="empty-state-text">Nothing matches these filters</div></div>`;
    return;
  }

  grid.innerHTML = items.map(item => cardHtml(item)).join('');
}

function cardHtml(item) {
  const poster = item.Poster
    ? `<img class="card-poster" src="${item.Poster}" alt="${escHtml(item.Title)}" loading="lazy">`
    : `<div class="card-poster-placeholder">🎬</div>`;

  const streamBadges = (item.StreamingService || '').split(',').filter(Boolean).map(s =>
    `<span class="badge badge-stream">${s.trim()}</span>`).join('');
  const typeBadge   = item.Type   ? `<span class="badge badge-type">${item.Type}</span>`       : '';
  const ratingBadge = item.Rating ? `<span class="badge badge-rating">⭐ ${item.Rating}</span>` : '';
  const meta        = [typeBadge, ratingBadge, streamBadges].filter(Boolean).join('');
  const runtime     = item.Runtime ? `<div style="font-size:11px;color:var(--muted);margin-bottom:4px">${item.Runtime}</div>` : '';

  return `<div class="card">
            ${poster}
            <div class="card-body">
              <div class="card-title">${escHtml(item.Title)}</div>
              ${meta ? `<div class="card-meta">${meta}</div>` : ''}
              ${runtime}
              <div class="card-actions">
                <button class="btn-vote" onclick="vote('${item.ID}',this)">👍 ${item.Votes || 0}</button>
                <button class="btn-icon" onclick="deleteItem('${item.ID}')" title="Remove">🗑</button>
              </div>
              <button class="btn-start-watching" onclick="startWatching('${item.ID}')">▶ Start Watching</button>
            </div>
          </div>`;
}

function buildStreamFilters() {
  const services = new Set();
  allItems.forEach(item =>
    (item.StreamingService || '').split(',').forEach(s => { const t = s.trim(); if (t) services.add(t); })
  );
  document.getElementById('stream-filters').innerHTML = [...services].slice(0, 6).map(s =>
    `<button class="filter-chip" onclick="setFilter(this,'${s}')">${s}</button>`
  ).join('');
}

// ═══════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════
async function vote(id, btn) {
  btn.disabled = true;
  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'vote', ID: id }), redirect: 'follow' });
    const data = await res.json();
    if (data.votes !== undefined) btn.textContent = `👍 ${data.votes}`;
  } catch (_) {}
  finally { btn.disabled = false; }
}

async function deleteItem(id) {
  if (!confirm('Remove this from the list?')) return;
  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteItem', ID: id }), redirect: 'follow' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allItems = allItems.filter(i => i.ID !== id);
    renderAll();
    showToast('🗑 Removed');
  } catch (_) { showToast('❌ Could not remove'); }
}

async function updateStatus(id, newStatus) {
  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateStatus', ID: id, Status: newStatus }), redirect: 'follow' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const item = allItems.find(i => i.ID === id);
    if (item) item.Status = newStatus;
    renderAll();
  } catch (_) { showToast('❌ Could not update status'); }
}

// PHASE 3 actions
async function startWatching(id) {
  await updateStatus(id, 'Currently Watching');
  showToast('▶ Added to Currently Watching');
}

async function markDone(id) {
  await updateStatus(id, 'Done');
  showToast('✅ Marked as done!');
}

async function moveToWantToWatch(id) {
  await updateStatus(id, 'Want to Watch');
  showToast('↩ Moved back to Want to Watch');
}

function setFilter(el, filter) {
  // Deactivate all row-1 chips
  document.querySelectorAll('.filter-bar .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = filter;
  renderWatchlist();
}

// ═══════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('tmdb-search').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  resetForm();
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function resetForm() {
  tmdbSelected  = null;
  selectedMoods = [];
  selectedWhom  = ['Whole Family'];
  document.getElementById('tmdb-search').value  = '';
  document.getElementById('manual-title').value = '';
  document.getElementById('field-status').value = 'Want to Watch';
  document.getElementById('autofill-preview').classList.remove('visible');
  document.getElementById('manual-title-wrap').style.display = 'block';
  hideSearchResults();
  buildMoodChips();
  buildWhomChips();
}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

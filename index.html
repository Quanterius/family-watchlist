<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Watchlist" />
  <link rel="manifest" href="manifest.json" />
  <title>🎬 Family Watchlist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f13;
      --surface:  #1a1a22;
      --surface2: #22222e;
      --border:   rgba(255,255,255,0.08);
      --border2:  rgba(255,255,255,0.15);
      --text:     #e8e8f0;
      --muted:    #888899;
      --accent:   #7c6fcd;
      --accent2:  #a594f9;
      --gold:     #f5c542;
      --green:    #4caf82;
      --red:      #e05c5c;
      --radius:   12px;
      --radius-sm:8px;
      --shadow:   0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a28 0%, #12121e 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .header-title span { color: var(--accent2); }

    .btn-refresh {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
      border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .btn-refresh:hover { color: var(--text); border-color: var(--accent); }
    .btn-refresh.spinning { animation: spin 0.7s linear infinite; }

    /* ── Filter bar ── */
    .filter-bar {
      padding: 7px 12px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-chip {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-chip.active, .filter-chip:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Filter row 2: dropdowns ── */
    .filter-bar-2 {
      padding: 7px 12px;
      display: flex;
      gap: 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .dropdown-wrap { position: relative; }

    .dropdown-trigger {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      user-select: none;
    }
    .dropdown-trigger .arrow { font-size: 9px; transition: transform 0.15s; }
    .dropdown-trigger.open .arrow { transform: rotate(180deg); }
    .dropdown-trigger.has-value { border-color: var(--accent); color: var(--accent2); background: rgba(124,111,205,0.15); }
    .dropdown-trigger.has-value.who-trigger { border-color: var(--green); color: var(--green); background: rgba(76,175,130,0.15); }

    .dropdown-panel {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 8px;
      z-index: 200;
      min-width: 180px;
      box-shadow: var(--shadow);
      flex-wrap: wrap;
      gap: 6px;
    }
    .dropdown-panel.open { display: flex; }

    .dropdown-option {
      padding: 5px 12px;
      border-radius: 14px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .dropdown-option:hover { background: var(--surface); color: var(--text); }
    .mood-option.active { background: rgba(124,111,205,0.3); border-color: var(--accent2); color: var(--accent2); }
    .who-option.active  { background: rgba(76,175,130,0.25); border-color: var(--green); color: var(--green); }
    .queue-option.active { background: rgba(124,111,205,0.3); border-color: var(--accent2); color: var(--accent2); }

    /* ── Section label ── */
    .section-label {
      padding: 16px 14px 8px;
      font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--muted);
      border-top: 1px solid var(--border);
    }
    .section-label:first-child { border-top: none; }

    /* ── Main list / grid ── */
    #main-list { padding: 0; }

    .stage-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 10px;
    }

    /* ── Card item ── */
    .list-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .list-item:active { transform: scale(0.97); box-shadow: var(--shadow); }

    .item-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }

    .item-poster-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .item-info {
      padding: 7px 8px 8px;
    }

    .item-title {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .item-meta { display: flex; align-items: center; gap: 5px; }

    .item-type { font-size: 12px; }

    .item-rating {
      font-size: 10px;
      color: var(--gold);
      font-weight: 600;
    }

    /* ── FAB ── */
    #fab {
      position: fixed; bottom: 24px; right: 20px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--accent); color: #fff; font-size: 26px; border: none;
      cursor: pointer; box-shadow: 0 4px 20px rgba(124,111,205,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; transition: transform 0.15s;
    }
    #fab:hover { transform: scale(1.08); }
    #fab:active { transform: scale(0.95); }

    /* ── Modal / Bottom sheet ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      z-index: 300; display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid var(--border2);
      width: 100%; max-width: 520px;
      max-height: 92vh; overflow-y: auto;
      padding: 20px 16px 40px;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .modal-title { font-size: 16px; font-weight: 700; }

    .btn-close {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--border2); background: transparent;
      color: var(--muted); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Detail sheet header ── */
    .detail-header {
      display: flex; gap: 14px; margin-bottom: 18px;
      padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    .detail-poster {
      width: 72px; height: 108px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0; background: var(--surface2);
    }
    .detail-poster-placeholder {
      width: 72px; height: 108px; border-radius: 8px;
      background: var(--surface2); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 28px;
    }
    .detail-header-info { flex: 1; min-width: 0; padding-top: 2px; }
    .detail-title { font-size: 15px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    .detail-badges { display: flex; flex-wrap: wrap; gap: 5px; }

    /* ── Read-only info rows ── */
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .info-row:last-of-type { border-bottom: none; margin-bottom: 4px; }
    .info-label { color: var(--muted); font-size: 12px; }
    .info-value { color: var(--text); text-align: right; max-width: 60%; }

    /* ── Add modal search ── */
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-input {
      width: 100%; padding: 11px 14px 11px 40px;
      border-radius: var(--radius-sm); border: 1px solid var(--border2);
      background: var(--surface2); color: var(--text); font-size: 15px;
      outline: none; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }

    .search-results {
      border-radius: var(--radius-sm); border: 1px solid var(--border2);
      background: var(--surface2); overflow: hidden; margin-bottom: 14px; display: none;
    }
    .search-result-item {
      display: flex; gap: 12px; padding: 10px 12px; cursor: pointer;
      border-bottom: 1px solid var(--border); transition: background 0.1s;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: rgba(124,111,205,0.12); }
    .result-thumb { width: 34px; height: 51px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: var(--surface); }
    .result-thumb-placeholder { width: 34px; height: 51px; border-radius: 4px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .result-info { flex: 1; min-width: 0; }
    .result-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .result-year  { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .result-desc  { font-size: 11px; color: var(--muted); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .autofill-preview {
      background: var(--surface2); border: 1px solid rgba(124,111,205,0.3);
      border-radius: var(--radius-sm); padding: 12px; margin-bottom: 14px; display: none; gap: 12px;
    }
    .autofill-preview.visible { display: flex; }
    .preview-poster { width: 50px; height: 75px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .preview-poster-placeholder { width: 50px; height: 75px; border-radius: 6px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .preview-info { flex: 1; }
    .preview-title { font-size: 13px; font-weight: 700; margin-bottom: 5px; }
    .preview-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 5px; }
    .clear-selection { background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer; text-decoration: underline; padding: 3px 0; display: block; }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px; }
    .form-control { width: 100%; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-size: 14px; outline: none; transition: border-color 0.15s; }
    .form-control:focus { border-color: var(--accent); }
    select.form-control option { background: #1a1a22; }

    .mood-chips  { display: flex; flex-wrap: wrap; gap: 7px; }
    .mood-chip   { padding: 5px 12px; border-radius: 14px; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.12s; }
    .mood-chip.selected  { background: var(--accent); border-color: var(--accent); color: #fff; }

    .whom-chips  { display: flex; flex-wrap: wrap; gap: 7px; }
    .whom-chip   { padding: 5px 12px; border-radius: 14px; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.12s; }
    .whom-chip.selected  { background: rgba(76,175,130,0.25); border-color: var(--green); color: var(--green); }

    /* Queue chips in detail sheet */
    .queue-chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .queue-chip  { padding: 5px 12px; border-radius: 14px; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.12s; }
    .queue-chip.selected { background: rgba(124,111,205,0.3); border-color: var(--accent2); color: var(--accent2); }

    .badge { padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
    .badge-type   { background: rgba(124,111,205,0.25); color: var(--accent2); }
    .badge-stream { background: rgba(76,175,130,0.2);   color: var(--green); }
    .badge-rating { background: rgba(245,197,66,0.2);   color: var(--gold); }
    .badge-genre  { background: rgba(255,255,255,0.07); color: var(--muted); }

    .btn-submit {
      width: 100%; padding: 13px; border-radius: var(--radius-sm);
      border: none; background: var(--accent); color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s; margin-top: 8px;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-save {
      width: 100%; padding: 13px; border-radius: var(--radius-sm);
      border: none; background: var(--accent); color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s; margin-top: 8px;
    }
    .btn-save:hover { opacity: 0.9; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-delete {
      width: 100%; padding: 13px; border-radius: var(--radius-sm);
      border: 1px solid rgba(224,92,92,0.4); background: rgba(224,92,92,0.1);
      color: var(--red); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; margin-top: 8px;
    }
    .btn-delete:hover { background: rgba(224,92,92,0.2); }

    .spinner { width: 28px; height: 28px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 36px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state-icon { font-size: 40px; margin-bottom: 10px; }
    .empty-state-text { font-size: 13px; }

    .toast { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px; padding: 9px 18px; font-size: 13px; z-index: 400; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }

    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    @media (min-width: 600px) {
      .modal { border-radius: var(--radius); margin: auto; max-height: 85vh; }
      .modal-overlay { align-items: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">🎬 <span>Family</span> Watchlist</div>
  <button class="btn-refresh" id="btn-refresh" onclick="refreshList()" title="Refresh">↻</button>
</header>

<!-- Filter row 1: Type -->
<div class="filter-bar">
  <button class="filter-chip active" onclick="setTypeFilter(this,'all')">All</button>
  <button class="filter-chip"        onclick="setTypeFilter(this,'movie')">🎬 Movies</button>
  <button class="filter-chip"        onclick="setTypeFilter(this,'tv')">📺 TV</button>
</div>

<!-- Filter row 2: Queue + Mood + Who -->
<div class="filter-bar-2">

  <!-- Queue dropdown -->
  <div class="dropdown-wrap">
    <button class="dropdown-trigger" id="queue-trigger" onclick="toggleDropdown('queue')">
      <span id="queue-label">Queue</span>
      <span class="arrow">▼</span>
    </button>
    <div class="dropdown-panel" id="queue-panel"></div>
  </div>

  <!-- Mood dropdown -->
  <div class="dropdown-wrap">
    <button class="dropdown-trigger" id="mood-trigger" onclick="toggleDropdown('mood')">
      <span id="mood-label">Mood</span>
      <span class="arrow">▼</span>
    </button>
    <div class="dropdown-panel" id="mood-panel"></div>
  </div>

  <!-- Who dropdown -->
  <div class="dropdown-wrap">
    <button class="dropdown-trigger who-trigger" id="who-trigger" onclick="toggleDropdown('who')">
      <span id="who-label">Who</span>
      <span class="arrow">▼</span>
    </button>
    <div class="dropdown-panel" id="who-panel"></div>
  </div>

</div>

<!-- Main list -->
<div id="main-list"><div class="spinner"></div></div>

<button id="fab" onclick="openAddModal()" aria-label="Add item">+</button>

<!-- ── Add Modal ── -->
<div id="add-modal-overlay" class="modal-overlay" onclick="handleAddOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add to Watchlist</span>
      <button class="btn-close" onclick="closeAddModal()">×</button>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="tmdb-search" class="search-input" type="text"
             placeholder="Search movies & TV shows…"
             autocomplete="off" oninput="onSearchInput(this.value)" />
    </div>

    <div id="search-results" class="search-results"></div>

    <div id="autofill-preview" class="autofill-preview">
      <div id="preview-poster-wrap"></div>
      <div class="preview-info">
        <div class="preview-title" id="preview-title"></div>
        <div class="preview-badges" id="preview-badges"></div>
        <button class="clear-selection" onclick="clearSelection()">✕ Clear selection</button>
      </div>
    </div>

    <div id="manual-title-wrap" class="form-group">
      <label class="form-label">Title *</label>
      <input id="manual-title" class="form-control" type="text" placeholder="Or type a title manually…" />
    </div>

    <div class="form-group">
      <label class="form-label">Queue</label>
      <select id="field-status" class="form-control">
        <option value="Watching">Watching</option>
        <option value="Up Next">Up Next</option>
        <option value="Want to Watch" selected>Want to Watch</option>
        <option value="Coming Back">Coming Back</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Mood</label>
      <div class="mood-chips" id="mood-chips"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Who it's for</label>
      <div class="whom-chips" id="whom-chips"></div>
    </div>

    <button class="btn-submit" id="btn-add" onclick="submitItem()">Add to Watchlist</button>
  </div>
</div>

<!-- ── Detail / Edit Modal ── -->
<div id="detail-modal-overlay" class="modal-overlay" onclick="handleDetailOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Details</span>
      <button class="btn-close" onclick="closeDetailModal()">×</button>
    </div>

    <!-- Poster + title -->
    <div class="detail-header">
      <div id="detail-poster-wrap"></div>
      <div class="detail-header-info">
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-badges" id="detail-badges"></div>
      </div>
    </div>

    <!-- Read-only info -->
    <div id="detail-info-rows"></div>

    <div class="divider"></div>

    <!-- Editable: Queue -->
    <div class="form-group">
      <label class="form-label">Queue</label>
      <div class="queue-chips" id="detail-queue-chips"></div>
    </div>

    <!-- Editable: Mood -->
    <div class="form-group">
      <label class="form-label">Mood</label>
      <div class="mood-chips" id="detail-mood-chips"></div>
    </div>

    <!-- Editable: Who -->
    <div class="form-group">
      <label class="form-label">Who it's for</label>
      <div class="whom-chips" id="detail-whom-chips"></div>
    </div>

    <button class="btn-save" id="btn-save" onclick="saveDetail()">Save Changes</button>
    <button class="btn-delete" onclick="deleteFromDetail()">🗑 Remove from Watchlist</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwh7aLZiMxgNYYcbLEW6xXAYY-muv3_c5P0eUbOQkbmhVI6QKPVC4uqtDyXf_2CuwdO/exec';
const TMDB_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI1NDlhMjI0ODZmYzllMDFmZjYxZGM3NmE5ZDJlNjg0ZCIsIm5iZiI6MTc3NTY4NTI1Ni40ODk5OTk4LCJzdWIiOiI2OWQ2Y2U4ODEzYTkzNGRiNThhMDA0ZWYiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.uAdlnaolIkng5I3LfsU_7OSdsKrt3ZLMyVu7IEv4TmI';

const QUEUE_STAGES   = ['Watching', 'Up Next', 'Want to Watch', 'Coming Back'];
const FAMILY_MEMBERS = ['Whole Family', 'Matt', 'Lisa', 'Joel', 'Adam', 'Parents', 'Joel & Dad'];
const MOOD_TAGS      = ['Reality', 'Comedy', 'Drama', 'Horror', 'Documentary', 'True Story'];

const STAGE_ICONS = {
  'Watching':      '👀',
  'Up Next':       '⏭',
  'Want to Watch': '📋',
  'Coming Back':   '🔄'
};

let allItems      = [];
let activeType    = 'all';
let activeQueue   = null;
let activeMood    = null;
let activeWho     = null;

// Add modal state
let selectedMoods = [];
let selectedWhom  = ['Whole Family'];
let tmdbSelected  = null;
let searchTimer   = null;

// Detail modal state
let detailItem        = null;
let detailMoods       = [];
let detailWhom        = [];
let detailQueueStatus = '';

// ── Init ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildAddMoodChips();
  buildAddWhomChips();
  buildQueuePanel();
  buildMoodPanel();
  buildWhoPanel();
  loadItems();
  document.addEventListener('click', e => {
    if (!e.target.closest('.dropdown-wrap')) closeAllDropdowns();
  });
});

// ── Refresh ──────────────────────────────────────────────
function refreshList() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  loadItems().finally(() => btn.classList.remove('spinning'));
}

// ── Dropdown logic ────────────────────────────────────────
function toggleDropdown(which) {
  const panel   = document.getElementById(which + '-panel');
  const trigger = document.getElementById(which + '-trigger');
  const isOpen  = panel.classList.contains('open');
  closeAllDropdowns();
  if (!isOpen) { panel.classList.add('open'); trigger.classList.add('open'); }
}

function closeAllDropdowns() {
  ['queue','mood','who'].forEach(w => {
    document.getElementById(w + '-panel').classList.remove('open');
    document.getElementById(w + '-trigger').classList.remove('open');
  });
}

function buildQueuePanel() {
  const panel = document.getElementById('queue-panel');
  const all = `<button class="dropdown-option queue-option${!activeQueue ? ' active' : ''}" onclick="selectQueue(null,event)">All</button>`;
  const opts = QUEUE_STAGES.map(s =>
    `<button class="dropdown-option queue-option${activeQueue === s ? ' active' : ''}" onclick="selectQueue('${s}',event)">${STAGE_ICONS[s]} ${s}</button>`
  ).join('');
  panel.innerHTML = all + opts;
}

function buildMoodPanel() {
  const panel = document.getElementById('mood-panel');
  panel.innerHTML = MOOD_TAGS.map(mood =>
    `<button class="dropdown-option mood-option${activeMood === mood ? ' active' : ''}" onclick="selectMood('${mood}',event)">${mood}</button>`
  ).join('');
}

function buildWhoPanel() {
  const panel = document.getElementById('who-panel');
  panel.innerHTML = FAMILY_MEMBERS.map(name =>
    `<button class="dropdown-option who-option${activeWho === name ? ' active' : ''}" onclick="selectWho('${name}',event)">${name}</button>`
  ).join('');
}

function selectQueue(val, e) {
  e.stopPropagation();
  activeQueue = val;
  buildQueuePanel();
  const trigger = document.getElementById('queue-trigger');
  document.getElementById('queue-label').textContent = val ? val : 'Queue';
  trigger.classList.toggle('has-value', !!val);
  closeAllDropdowns();
  renderList();
}

function selectMood(mood, e) {
  e.stopPropagation();
  activeMood = activeMood === mood ? null : mood;
  buildMoodPanel();
  document.getElementById('mood-label').textContent = activeMood || 'Mood';
  document.getElementById('mood-trigger').classList.toggle('has-value', !!activeMood);
  closeAllDropdowns();
  renderList();
}

function selectWho(name, e) {
  e.stopPropagation();
  activeWho = activeWho === name ? null : name;
  buildWhoPanel();
  document.getElementById('who-label').textContent = activeWho || 'Who';
  document.getElementById('who-trigger').classList.toggle('has-value', !!activeWho);
  closeAllDropdowns();
  renderList();
}

// ── Type filter ───────────────────────────────────────────
function setTypeFilter(el, type) {
  document.querySelectorAll('.filter-bar .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeType = type;
  renderList();
}

// ── TMDB ─────────────────────────────────────────────────
const TMDB_BASE  = 'https://api.themoviedb.org/3';
const TMDB_IMG   = 'https://image.tmdb.org/t/p/';
const TMDB_HEADS = { Authorization: `Bearer ${TMDB_TOKEN}`, 'Content-Type': 'application/json' };

async function tmdbSearch(query) {
  if (!query.trim()) return [];
  const res = await fetch(`${TMDB_BASE}/search/multi?query=${encodeURIComponent(query)}&include_adult=false`, { headers: TMDB_HEADS });
  if (!res.ok) return [];
  const data = await res.json();
  return (data.results || []).filter(r => r.media_type === 'movie' || r.media_type === 'tv').slice(0, 6);
}

async function tmdbDetails(id, mediaType) {
  const [detRes, provRes] = await Promise.all([
    fetch(`${TMDB_BASE}/${mediaType}/${id}?language=en-US`, { headers: TMDB_HEADS }),
    fetch(`${TMDB_BASE}/${mediaType}/${id}/watch/providers`, { headers: TMDB_HEADS }),
  ]);
  const det  = detRes.ok  ? await detRes.json()  : {};
  const prov = provRes.ok ? await provRes.json() : {};

  const streaming = (prov.results?.US?.flatrate || []).map(p => p.provider_name).slice(0, 3).join(', ');
  const genre     = (det.genres || []).map(g => g.name).slice(0, 2).join(', ');
  const rating    = det.vote_average ? det.vote_average.toFixed(1) : '';
  const desc      = det.overview || '';

  let runtime = '';
  if (mediaType === 'movie' && det.runtime) {
    runtime = `${det.runtime} min`;
  } else if (mediaType === 'tv') {
    const s = det.number_of_seasons, ep = det.number_of_episodes;
    runtime = s ? `${s} season${s > 1 ? 's' : ''}${ep ? `, ${ep} ep` : ''}` : '';
  }

  return { streaming, genre, rating, runtime, desc, details: det };
}

// ── Search UI ─────────────────────────────────────────────
function onSearchInput(val) {
  clearTimeout(searchTimer);
  if (!val.trim()) { hideSearchResults(); return; }
  searchTimer = setTimeout(() => doSearch(val), 350);
}

async function doSearch(query) {
  const box = document.getElementById('search-results');
  box.innerHTML = '<div style="padding:12px;text-align:center;color:var(--muted);font-size:13px">Searching…</div>';
  box.style.display = 'block';
  // Scroll modal to top so results are visible
  document.querySelector('#add-modal-overlay .modal').scrollTop = 0;
  const results = await tmdbSearch(query);
  if (!results.length) {
    box.innerHTML = '<div style="padding:12px;text-align:center;color:var(--muted);font-size:13px">No results — add manually below</div>';
    return;
  }
  box.innerHTML = results.map(r => {
    const title = r.title || r.name || '';
    const year  = (r.release_date || r.first_air_date || '').slice(0, 4);
    const thumb = r.poster_path
      ? `<img class="result-thumb" src="${TMDB_IMG}w92${r.poster_path}" loading="lazy" />`
      : `<div class="result-thumb-placeholder">🎬</div>`;
    return `<div class="search-result-item" onclick="selectResult(${r.id},'${r.media_type}')">
              ${thumb}
              <div class="result-info">
                <div class="result-title">${escHtml(title)}</div>
                <div class="result-year">${year} · ${r.media_type === 'movie' ? '🎬 Movie' : '📺 TV'}</div>
                <div class="result-desc">${escHtml((r.overview || '').slice(0, 90))}</div>
              </div>
            </div>`;
  }).join('');
}

async function selectResult(id, mediaType) {
  hideSearchResults();
  document.getElementById('tmdb-search').value = '';
  const preview    = document.getElementById('autofill-preview');
  const posterWrap = document.getElementById('preview-poster-wrap');
  posterWrap.innerHTML = `<div class="preview-poster-placeholder">…</div>`;
  document.getElementById('preview-title').textContent = 'Loading…';
  document.getElementById('preview-badges').innerHTML  = '';
  preview.classList.add('visible');
  document.getElementById('manual-title-wrap').style.display = 'none';

  const { streaming, genre, rating, runtime, desc, details } = await tmdbDetails(id, mediaType);
  const title     = details.title || details.name || '';
  const posterUrl = details.poster_path ? `${TMDB_IMG}w342${details.poster_path}` : '';

  tmdbSelected = { id, mediaType, title, posterUrl, streaming, genre, rating, runtime, desc };

  posterWrap.innerHTML = posterUrl
    ? `<img class="preview-poster" src="${posterUrl}" />`
    : `<div class="preview-poster-placeholder">🎬</div>`;
  document.getElementById('preview-title').textContent = title;

  const badges = [mediaType === 'movie'
    ? '<span class="badge badge-type">🎬 Movie</span>'
    : '<span class="badge badge-type">📺 TV</span>'];
  if (rating)    badges.push(`<span class="badge badge-rating">⭐ ${rating}</span>`);
  if (runtime)   badges.push(`<span class="badge badge-stream">${runtime}</span>`);
  if (streaming) badges.push(`<span class="badge badge-stream">${streaming}</span>`);
  if (genre)     badges.push(`<span class="badge badge-genre">${genre}</span>`);
  document.getElementById('preview-badges').innerHTML = badges.join('');
}

function clearSelection() {
  tmdbSelected = null;
  document.getElementById('autofill-preview').classList.remove('visible');
  document.getElementById('manual-title-wrap').style.display = 'block';
  document.getElementById('tmdb-search').value = '';
}

function hideSearchResults() {
  const box = document.getElementById('search-results');
  box.style.display = 'none';
  box.innerHTML = '';
}

// ── Add modal chips ───────────────────────────────────────
function buildAddMoodChips() {
  document.getElementById('mood-chips').innerHTML = MOOD_TAGS.map(m =>
    `<button class="mood-chip" onclick="toggleAddMood(this,'${m}')">${m}</button>`
  ).join('');
}

function buildAddWhomChips() {
  document.getElementById('whom-chips').innerHTML = FAMILY_MEMBERS.map(m =>
    `<button class="whom-chip${m === 'Whole Family' ? ' selected' : ''}" onclick="toggleAddWhom(this,'${m}')">${m}</button>`
  ).join('');
}

function toggleAddMood(el, mood) {
  el.classList.toggle('selected');
  selectedMoods = selectedMoods.includes(mood)
    ? selectedMoods.filter(m => m !== mood)
    : [...selectedMoods, mood];
}

function toggleAddWhom(el, name) {
  el.classList.toggle('selected');
  selectedWhom = selectedWhom.includes(name)
    ? selectedWhom.filter(w => w !== name)
    : [...selectedWhom, name];
  if (!selectedWhom.length) {
    selectedWhom = ['Whole Family'];
    document.querySelectorAll('#whom-chips .whom-chip').forEach(c => {
      c.classList.toggle('selected', c.textContent === 'Whole Family');
    });
  }
}

// ── Submit new item ───────────────────────────────────────
async function submitItem() {
  const title = tmdbSelected
    ? tmdbSelected.title
    : document.getElementById('manual-title').value.trim();
  if (!title) { showToast('Please enter a title'); return; }

  const btn = document.getElementById('btn-add');
  btn.disabled = true; btn.textContent = 'Adding…';

  const body = {
    action:           'addItem',
    Title:            title,
    Type:             tmdbSelected ? (tmdbSelected.mediaType === 'movie' ? 'Movie' : 'TV Show') : '',
    Status:           document.getElementById('field-status').value,
    ForWho:           selectedWhom.join(', '),
    MoodTags:         selectedMoods.join(', '),
    Poster:           tmdbSelected?.posterUrl    || '',
    Description:      tmdbSelected?.desc         || '',
    StreamingService: tmdbSelected?.streaming    || '',
    Runtime:          tmdbSelected?.runtime      || '',
    Genre:            tmdbSelected?.genre        || '',
    Rating:           tmdbSelected?.rating       || '',
  };

  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(body), redirect: 'follow' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showToast('✅ Added!');
    closeAddModal();
    loadItems();
  } catch (err) {
    showToast('❌ Error: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Add to Watchlist';
  }
}

// ── Load & render ─────────────────────────────────────────
async function loadItems() {
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getItems`);
    const data = await res.json();
    allItems = data.items || [];
    renderList();
  } catch (e) {
    document.getElementById('main-list').innerHTML =
      `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">Couldn't load the list</div></div>`;
  }
}

function renderList() {
  const container = document.getElementById('main-list');

  let items = [...allItems];

  // Type filter
  if (activeType === 'movie') items = items.filter(i => i.Type === 'Movie');
  if (activeType === 'tv')    items = items.filter(i => i.Type === 'TV Show');

  // Mood filter
  if (activeMood) {
    items = items.filter(i =>
      (i.MoodTags || '').split(',').map(t => t.trim()).includes(activeMood)
    );
  }

  // Who filter — exact match only
  if (activeWho) {
    items = items.filter(i =>
      (i.ForWho || '').split(',').map(w => w.trim()).includes(activeWho)
    );
  }

  // Queue filter — if set, show only that stage flat (no section headers)
  if (activeQueue) {
    const filtered = items.filter(i => i.Status === activeQueue);
    if (!filtered.length) {
      container.innerHTML = emptyHtml();
      return;
    }
    container.innerHTML = `<div class="stage-grid">${filtered.map(itemRowHtml).join('')}</div>`;
    return;
  }

  // Default: group by stage with headers
  let html = '';
  let anyItem = false;

  QUEUE_STAGES.forEach(stage => {
    const stageItems = items.filter(i => i.Status === stage);
    if (!stageItems.length) return;
    anyItem = true;
    html += `<div class="section-label">${STAGE_ICONS[stage]} ${stage}</div>`;
    html += `<div class="stage-grid">${stageItems.map(itemRowHtml).join('')}</div>`;
  });

  container.innerHTML = anyItem ? html : emptyHtml();
}

function itemRowHtml(item) {
  const poster = item.Poster
    ? `<img class="item-poster" src="${escHtml(item.Poster)}" alt="${escHtml(item.Title)}" loading="lazy">`
    : `<div class="item-poster-placeholder">🎬</div>`;

  const typeEmoji = item.Type === 'Movie' ? '🎬' : item.Type === 'TV Show' ? '📺' : '';
  const rating    = item.Rating ? `<span class="item-rating">⭐ ${item.Rating}</span>` : '';

  return `<div class="list-item" onclick="openDetailModal('${escHtml(item.ID)}')">
            ${poster}
            <div class="item-info">
              <div class="item-title">${escHtml(item.Title)}</div>
              <div class="item-meta">
                ${typeEmoji ? `<span class="item-type">${typeEmoji}</span>` : ''}
                ${rating}
              </div>
            </div>
          </div>`;
}

function emptyHtml() {
  return `<div class="empty-state"><div class="empty-state-icon">🍿</div><div class="empty-state-text">Nothing matches these filters</div></div>`;
}

// ── Detail modal ──────────────────────────────────────────
function openDetailModal(id) {
  const item = allItems.find(i => String(i.ID) === String(id));
  if (!item) return;
  detailItem        = item;
  detailMoods       = (item.MoodTags || '').split(',').map(t => t.trim()).filter(Boolean);
  detailWhom        = (item.ForWho   || '').split(',').map(w => w.trim()).filter(Boolean);
  detailQueueStatus = item.Status || 'Want to Watch';

  // Poster
  const posterWrap = document.getElementById('detail-poster-wrap');
  posterWrap.innerHTML = item.Poster
    ? `<img class="detail-poster" src="${escHtml(item.Poster)}" alt="${escHtml(item.Title)}">`
    : `<div class="detail-poster-placeholder">🎬</div>`;

  // Title & badges
  document.getElementById('detail-title').textContent = item.Title;
  const typeBadge   = item.Type   ? `<span class="badge badge-type">${item.Type === 'Movie' ? '🎬' : '📺'} ${item.Type}</span>` : '';
  const ratingBadge = item.Rating ? `<span class="badge badge-rating">⭐ ${item.Rating}</span>` : '';
  document.getElementById('detail-badges').innerHTML = [typeBadge, ratingBadge].filter(Boolean).join('');

  // Info rows
  const rows = [
    { label: 'Streaming',  value: item.StreamingService },
    { label: 'Genre',      value: item.Genre },
    { label: 'Runtime',    value: item.Runtime },
  ];
  document.getElementById('detail-info-rows').innerHTML = rows
    .filter(r => r.value)
    .map(r => `<div class="info-row"><span class="info-label">${r.label}</span><span class="info-value">${escHtml(String(r.value))}</span></div>`)
    .join('');

  // Queue chips
  buildDetailQueueChips();
  buildDetailMoodChips();
  buildDetailWhomChips();

  document.getElementById('detail-modal-overlay').classList.add('open');
}

function buildDetailQueueChips() {
  document.getElementById('detail-queue-chips').innerHTML = QUEUE_STAGES.map(s =>
    `<button class="queue-chip${detailQueueStatus === s ? ' selected' : ''}" onclick="selectDetailQueue('${s}')">${STAGE_ICONS[s]} ${s}</button>`
  ).join('');
}

function buildDetailMoodChips() {
  document.getElementById('detail-mood-chips').innerHTML = MOOD_TAGS.map(m =>
    `<button class="mood-chip${detailMoods.includes(m) ? ' selected' : ''}" onclick="toggleDetailMood(this,'${m}')">${m}</button>`
  ).join('');
}

function buildDetailWhomChips() {
  document.getElementById('detail-whom-chips').innerHTML = FAMILY_MEMBERS.map(m =>
    `<button class="whom-chip${detailWhom.includes(m) ? ' selected' : ''}" onclick="toggleDetailWhom(this,'${m}')">${m}</button>`
  ).join('');
}

function selectDetailQueue(status) {
  detailQueueStatus = status;
  buildDetailQueueChips();
}

function toggleDetailMood(el, mood) {
  el.classList.toggle('selected');
  detailMoods = detailMoods.includes(mood)
    ? detailMoods.filter(m => m !== mood)
    : [...detailMoods, mood];
}

function toggleDetailWhom(el, name) {
  el.classList.toggle('selected');
  detailWhom = detailWhom.includes(name)
    ? detailWhom.filter(w => w !== name)
    : [...detailWhom, name];
  if (!detailWhom.length) {
    detailWhom = ['Whole Family'];
    buildDetailWhomChips();
  }
}

async function saveDetail() {
  if (!detailItem) return;
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Saving…';

  const body = {
    action:   'updateItem',
    ID:       detailItem.ID,
    Status:   detailQueueStatus,
    MoodTags: detailMoods.join(', '),
    ForWho:   detailWhom.join(', '),
  };

  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(body), redirect: 'follow' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    // Update in memory
    const item = allItems.find(i => String(i.ID) === String(detailItem.ID));
    if (item) {
      item.Status   = detailQueueStatus;
      item.MoodTags = detailMoods.join(', ');
      item.ForWho   = detailWhom.join(', ');
    }
    showToast('✅ Saved!');
    closeDetailModal();
    renderList();
  } catch (err) {
    showToast('❌ Error: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Save Changes';
  }
}

async function deleteFromDetail() {
  if (!detailItem) return;
  if (!confirm(`Remove "${detailItem.Title}" from the watchlist?`)) return;

  try {
    const res  = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteItem', ID: detailItem.ID }), redirect: 'follow' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allItems = allItems.filter(i => String(i.ID) !== String(detailItem.ID));
    showToast('🗑 Removed');
    closeDetailModal();
    renderList();
  } catch (_) { showToast('❌ Could not remove'); }
}

function closeDetailModal() {
  document.getElementById('detail-modal-overlay').classList.remove('open');
  detailItem = null;
}

function handleDetailOverlayClick(e) {
  if (e.target === document.getElementById('detail-modal-overlay')) closeDetailModal();
}

// ── Add modal ─────────────────────────────────────────────
function openAddModal() {
  document.getElementById('add-modal-overlay').classList.add('open');
  document.getElementById('tmdb-search').focus();
}

function closeAddModal() {
  document.getElementById('add-modal-overlay').classList.remove('open');
  resetAddForm();
}

function handleAddOverlayClick(e) {
  if (e.target === document.getElementById('add-modal-overlay')) closeAddModal();
}

function resetAddForm() {
  tmdbSelected  = null;
  selectedMoods = [];
  selectedWhom  = ['Whole Family'];
  document.getElementById('tmdb-search').value  = '';
  document.getElementById('manual-title').value = '';
  document.getElementById('field-status').value = 'Want to Watch';
  document.getElementById('autofill-preview').classList.remove('visible');
  document.getElementById('manual-title-wrap').style.display = 'block';
  hideSearchResults();
  buildAddMoodChips();
  buildAddWhomChips();
}

// ── Utils ─────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
